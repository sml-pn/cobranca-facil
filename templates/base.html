<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cobrança Fácil</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* NOVO HAMBURGUER */
        .hamburger {
            display: none;
            width: 30px;
            height: 22px;
            position: relative;
            cursor: pointer;
            background: none;
            border: none;
        }

        .hamburger span {
            position: absolute;
            width: 100%;
            height: 3px;
            background: white;
            left: 0;
            transition: 0.3s;
            border-radius: 5px;
        }

        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 9px; }
        .hamburger span:nth-child(3) { top: 18px; }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg);
            top: 9px;
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg);
            top: 9px;
        }

        /* NAV */
        .nav-bar {
            background: white;
            padding: 0.6rem 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .nav-bar a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .hamburger { display: block; }

            .nav-bar {
                display: none;
                flex-direction: column;
            }

            .nav-bar.show {
                display: flex;
            }
        }

        .main-content {
            padding: 20px;
        }
    </style>
</head>

<body>

<header class="header">
    <span class="logo-text">Cobrança Fácil</span>

    <!-- BOTÃO NOVO -->
    <button class="hamburger" onclick="toggleMenu(this)">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>

<nav class="nav-bar" id="mainNav">
    <a href="#">Dashboard</a>
    <a href="#">Clientes</a>
    <a href="#">Novo Cliente</a>
    <a href="#">Configurações</a>
    <a href="#">Sair</a>
</nav>

<div class="main-content">
    <h1>Seu sistema</h1>
    <p>Agora com hambúrguer animado 🔥</p>
</div>

<script>
function toggleMenu(btn) {
    const nav = document.getElementById('mainNav');
    nav.classList.toggle('show');
    btn.classList.toggle('active');
}
</script>

</body
