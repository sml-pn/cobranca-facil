{% extends "base.html" %}

{% block title %}Dashboard - Cobrança Fácil{% endblock %}

{% block content %}

<div class="kpi-grid">
    <div class="kpi-card filter-chip-card" data-filter="vencidas" style="background: linear-gradient(135deg, #dc3545, #8b1e1e);">
        <i class="fas fa-exclamation-circle"></i>
        <h3>{{ count_vencidas }}</h3>
        <p>Vencidas</p>
    </div>
    <div class="kpi-card filter-chip-card" data-filter="hoje" style="background: linear-gradient(135deg, #fd7e14, #c05e00);">
        <i class="fas fa-bell"></i>
        <h3>{{ count_hoje }}</h3>
        <p>Vence HOJE</p>
    </div>
    <div class="kpi-card filter-chip-card" data-filter="semana" style="background: linear-gradient(135deg, #ffc107, #d4a000); color: #1e293b;">
        <i class="fas fa-calendar-alt"></i>
        <h3>{{ count_semana }}</h3>
        <p>Esta Semana</p>
    </div>
    <div class="kpi-card filter-chip-card" data-filter="todas" style="background: linear-gradient(135deg, #28a745, #1e7a34);">
        <i class="fas fa-hand-holding-usd"></i>
        <h3 class="kpi-valor">{{ total_receber|real }}</h3>
        <p>Total a Receber</p>
    </div>
</div>

<div class="filter-chips-container">
    <div class="filter-chips">
        <div class="filter-chip active" data-filter="todas">Todas</div>
        <div class="filter-chip" data-filter="vencidas">Vencidas</div>
        <div class="filter-chip" data-filter="hoje">Vence Hoje</div>
        <div class="filter-chip" data-filter="semana">Esta Semana</div>
    </div>
    <div class="ordenacao-wrapper">
        <label for="ordenacao"><i class="fas fa-sort"></i></label>
        <select id="ordenacao">
            <option value="data">Data</option>
            <option value="nome">Nome</option>
            <option value="valor">Valor</option>
        </select>
    </div>
</div>

<div id="parcelasContainer"></div>

<div id="loadMoreContainer" style="text-align: center; margin-top: 20px; display: none;">
    <button class="btn btn-outline" onclick="carregarMais()">
        <i class="fas fa-chevron-down"></i> Carregar mais
    </button>
</div>

<div id="installHelpButton">
    <button onclick="showInstallGuide()">⬇️ Como baixar o App</button>
</div>

<style>

/* ===== BASE ===== */
* { box-sizing: border-box; }

body, .main-content {
    max-width: 100%;
    overflow-x: hidden;
}

.main-content {
    padding: 1rem;
}

/* ===== KPI ===== */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

@media (min-width: 640px) {
    .kpi-grid { grid-template-columns: repeat(4, 1fr); }
}

.kpi-card {
    padding: 1rem 0.5rem;
    text-align: center;
    border-radius: 16px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    word-break: break-word;
}

.kpi-card h3 {
    font-size: 1.6rem;
    line-height: 1.2;
}

.kpi-valor {
    font-size: 1.3rem;
    word-break: break-all;
}

/* ===== FILTROS ===== */
.filter-chips-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 10px;
}

.filter-chip {
    padding: 8px 12px;
    border-radius: 30px;
    white-space: nowrap;
}

.ordenacao-wrapper select {
    max-width: 100%;
}

/* ===== TABELA ===== */
.parcela-table {
    width: 100%;
    table-layout: fixed;
}

/* ===== MOBILE ===== */
@media (max-width: 640px) {

    .parcela-table thead {
        display: none;
    }

    .parcela-table tbody tr {
        display: block;
        margin-bottom: 12px;
        border-radius: 12px;
        padding: 10px;
    }

    .parcela-table td {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 6px 0;
    }

    .parcela-table td::before {
        content: attr(data-label);
        font-weight: bold;
        font-size: 0.75rem;
    }

    .parcela-table td > * {
        max-width: 100%;
        word-break: break-word;
    }

    .parcela-actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .btn-success, .btn-whatsapp {
        width: 100%;
    }
}

/* ===== BOTÃO FIXO AJUSTADO ===== */
#installHelpButton {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
}

#installHelpButton button {
    background: #1e3c72;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 30px;
}

/* evita sobreposição */
@media (max-width: 640px) {
    body {
        padding-bottom: 80px;
    }
}

</style>

<script>

/* ===== MOSTRAR BOTÃO MOBILE ===== */
if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
    document.getElementById('installHelpButton').style.display = 'block';
}

/* ===== GUIA ===== */
function showInstallGuide() {
    alert("No Chrome: menu ⋮ → Instalar app");
}

</script>

{% endblock %}
