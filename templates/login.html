<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cobrança Fácil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; border-radius: 24px; padding: 40px 30px; max-width: 400px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-card h2 { text-align: center; margin-bottom: 30px; color: #1e3c72; font-size: 2rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; }
        .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid #cbd5e1; border-radius: 12px; font-size: 1rem; transition: border 0.2s; }
        .form-group input:focus { border-color: #2a5298; outline: none; box-shadow: 0 0 0 3px rgba(42,82,152,0.15); }
        .btn-login { width: 100%; background: #2a5298; color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-login:hover { background: #1e3c72; }
        .flash-messages { margin-bottom: 20px; }
        .flash { padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; font-size: 0.9rem; }
        .flash.danger { background: #fee2e2; color: #b91c1c; }
        .flash.success { background: #d1fae5; color: #065f46; }
        .flash.warning { background: #fff3cd; color: #856404; }
        .footer-links { text-align: center; margin-top: 20px; }
        .footer-links a { color: #2a5298; text-decoration: none; font-size: 0.9rem; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2><i class="fas fa-hand-holding-usd"></i> Cobrança Fácil</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label for="usuario"><i class="fas fa-user"></i> Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required autofocus>
            </div>
            <div class="form-group">
                <label for="senha"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </form>
        <div class="footer-links">
            <a href="{{ url_for('esqueci_senha') }}"><i class="fas fa-question-circle"></i> Esqueci a senha?</a>
        </div>
    </div>
</body>
</html>
