<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a Senha - Cobrança Fácil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Roboto, sans-serif; }
        .card { background: white; border-radius: 24px; padding: 30px; max-width: 400px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        h3 { color: #1e3c72; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 1.5px solid #cbd5e1; border-radius: 12px; margin-bottom: 20px; }
        button { width: 100%; background: #2a5298; color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .flash { padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .flash.success { background: #d1fae5; color: #065f46; }
        .flash.danger { background: #fee2e2; color: #b91c1c; }
        a { color: #2a5298; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h3><i class="fas fa-key"></i> Recuperar Senha</h3>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <label>Número do WhatsApp cadastrado</label>
            <input type="tel" name="telefone" placeholder="(85) 99999-9999" required>
            <button type="submit">Enviar link de recuperação</button>
        </form>
        <p style="text-align: center; margin-top: 20px;"><a href="{{ url_for('login') }}">← Voltar para o login</a></p>
    </div>
</body>
</html>
